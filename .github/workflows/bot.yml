name: Bot Riset Koin (Telegram)

# JALUR UTAMA: repository_dispatch.
# Telegram -> Cloudflare Worker -> POST /dispatches -> workflow ini jalan SEKARANG.
# Pesannya ikut dikirim lewat client_payload, jadi tidak perlu polling sama sekali.
#
# Cron SENGAJA TIDAK DIPAKAI: GitHub tidak menjamin jadwal — "*/5" kenyataannya
# berjalan ~1 jam sekali, kadang lebih dari 3 jam, sehingga balasan terasa hilang.
#
# workflow_dispatch disimpan sebagai CADANGAN manual (mode polling). Catatan: selama
# webhook Telegram aktif, getUpdates dinonaktifkan Telegram — jalankan
# deploy/set-webhook.sh --delete dulu kalau mau memakai mode polling.

on:
  repository_dispatch:
    types: [telegram]
  workflow_dispatch: {}

# Satu pesan diproses satu per satu. Pesan berikutnya mengantre, tidak dibatalkan.
concurrency:
  group: telegram-analisa-bot
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Kunci API diwariskan ke server MCP lewat environment job ini.
      # SENGAJA tidak ditulis sebagai "${...}" di .mcp.cloud.json: kalau variabelnya
      # tidak di-set, Claude Code meneruskan teks harfiah "${NAMA}" sebagai nilai,
      # dan server MCP menganggapnya kunci sungguhan lalu gagal dengan error auth
      # yang membingungkan. Pewarisan environment tidak punya masalah itu.
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
      COINMARKETCAP_API_KEY: ${{ secrets.COINMARKETCAP_API_KEY }}
      # Untuk holder/wallet multi-chain (BSC, Base, Arbitrum, Solana, dll) via cloud/
      # investors.py & wallet.py. GRATIS — daftar di moralis.com. Kalau kosong, chain
      # Ethereum tetap jalan (pakai Ethplorer); chain lain akan memberi pesan jelas.
      MORALIS_API_KEY: ${{ secrets.MORALIS_API_KEY }}
      SUBSCRIPTION_LEVEL: Basic
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      # Isi hanya saat dipicu webhook; kosong saat dijalankan manual.
      TG_CHAT_ID: ${{ github.event.client_payload.chat_id }}
      TG_TEXT: ${{ github.event.client_payload.text }}
      TG_PHOTO_FILE_ID: ${{ github.event.client_payload.photo_file_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Hanya untuk jalur manual: cek dulu ada pesan menunggu atau tidak, supaya
      # run kosong berhenti murah tanpa memasang apa pun.
      - name: Cek pesan menunggu (mode manual)
        id: check
        if: github.event_name == 'workflow_dispatch'
        run: python cloud/bot_oneshot.py --check

      - name: Setup Node
        if: github.event_name == 'repository_dispatch' || steps.check.outputs.has_work == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Sengaja install global, bukan "npx -y" di dalam konfigurasi MCP: npx mengunduh
      # ulang tiap run (lambat) dan pernah gagal karena cache terkunci. Binary global
      # membuat perintahnya deterministik.
      - name: Install Claude Code CLI & MCP server (Node)
        if: github.event_name == 'repository_dispatch' || steps.check.outputs.has_work == 'true'
        run: npm install -g @anthropic-ai/claude-code mcp-coinglass @shinzolabs/coinmarketcap-mcp

      - name: Install TradingView MCP (versi data)
        if: github.event_name == 'repository_dispatch' || steps.check.outputs.has_work == 'true'
        run: pip install tradingview-mcp-server

      - name: Jalankan analisa & balas ke Telegram
        if: github.event_name == 'repository_dispatch' || steps.check.outputs.has_work == 'true'
        run: python cloud/bot_oneshot.py
